<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas Helper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; font-size: 13px; }
    .header { background: linear-gradient(135deg, #C9A84C, #F5E09A); padding: 16px; text-align: center; }
    .header h1 { color: #1a1a1a; font-size: 18px; font-weight: 700; margin: 0; }
    .header p { color: #333; font-size: 11px; margin: 4px 0 0; text-transform: uppercase; letter-spacing: 0.05em; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; background: #16213e; border-bottom: 1px solid #0f3460; }
    .stat { text-align: center; padding: 8px; background: #1a1a2e; border-radius: 8px; }
    .stat-value { font-size: 18px; font-weight: 700; color: #C9A84C; }
    .stat-label { font-size: 9px; color: #888; text-transform: uppercase; margin-top: 2px; }
    .status-bar { padding: 10px 12px; background: #0f3460; display: flex; align-items: center; justify-content: space-between; font-size: 11px; }
    .status-badge { padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
    .status-connected { background: #22c55e33; color: #22c55e; }
    .status-disconnected { background: #ef444433; color: #ef4444; }
    .order-banner { padding: 12px; background: #2d1f1f; border-bottom: 1px solid #C9A84C33; }
    .order-banner.visible { display: block; }
    .order-banner.hidden { display: none; }
    .order-banner-text { font-size: 12px; color: #e0e0e0; margin-bottom: 8px; }
    .btn-row { display: flex; gap: 8px; }
    .btn { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #C9A84C; color: #1a1a1a; }
    .btn-primary:hover { background: #F5E09A; }
    .btn-secondary { background: #0f3460; color: #e0e0e0; }
    .btn-secondary:hover { background: #1a4a7a; }
    .section { padding: 12px; border-bottom: 1px solid #0f3460; }
    .section-title { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.05em; }
    .input { width: 100%; padding: 8px 10px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; color: #e0e0e0; font-size: 12px; margin-bottom: 8px; }
    .input:focus { outline: none; border-color: #C9A84C; }
    .select { width: 100%; padding: 8px 10px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; color: #e0e0e0; font-size: 12px; margin-bottom: 8px; }
    .recent-orders { max-height: 150px; overflow-y: auto; }
    .order-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: #1a1a2e; border-radius: 6px; margin-bottom: 6px; }
    .order-store-icon { font-size: 16px; }
    .order-info { flex: 1; }
    .order-num { font-size: 11px; font-weight: 600; color: #e0e0e0; }
    .order-store-name { font-size: 10px; color: #888; }
    .order-price { font-size: 12px; font-weight: 600; color: #C9A84C; }
    .empty-orders { text-align: center; padding: 20px; color: #666; font-size: 11px; }
    .empty-icon { font-size: 24px; margin-bottom: 8px; }
    .action-row { display: flex; gap: 8px; padding: 12px; }
    .action-btn { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .action-btn-export { background: #059669; color: white; }
    .action-btn-clear { background: #dc2626; color: white; }
    .status-msg { padding: 10px 12px; font-size: 11px; text-align: center; display: none; }
    .status-msg.visible { display: block; }
    .status-success { background: #22c55e33; color: #22c55e; }
    .status-error { background: #ef444433; color: #ef4444; }
    .status-loading { background: #3b82f633; color: #3b82f6; }
    .atlas-section { padding: 12px; background: #16213e; }
    .atlas-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .footer { padding: 10px 12px; background: #0f3460; text-align: center; font-size: 10px; color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎯 Atlas Helper</h1>
    <p>Order Importer</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="statOrders">0</div>
      <div class="stat-label">Orders</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statSpent">$0</div>
      <div class="stat-label">Spent</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statStores">0</div>
      <div class="stat-label">Stores</div>
    </div>
  </div>

  <div class="status-bar">
    <span id="pageStatus">Checking...</span>
    <span class="status-badge status-disconnected" id="statusBadge">Disconnected</span>
  </div>

  <div class="order-banner hidden" id="orderBanner">
    <div class="order-banner-text" id="orderBannerText">Order detected!</div>
    <div class="btn-row">
      <button class="btn btn-primary" id="importNowBtn">Import Now</button>
      <button class="btn btn-secondary" id="dismissBtn">Dismiss</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Manual Import</div>
    <select class="select" id="storeSelect">
      <option value="Amazon">Amazon</option>
      <option value="Walmart">Walmart</option>
      <option value="Target">Target</option>
      <option value="Best Buy">Best Buy</option>
      <option value="Woot">Woot</option>
      <option value="eBay">eBay</option>
      <option value="Costco">Costco</option>
      <option value="Home Depot">Home Depot</option>
      <option value="Newegg">Newegg</option>
      <option value="Wayfair">Wayfair</option>
      <option value="Etsy">Etsy</option>
      <option value="Chewy">Chewy</option>
    </select>
    <input type="text" class="input" id="orderInput" placeholder="Order Number">
    <button class="btn btn-primary" id="importByIdBtn" style="width: 100%">Import by Order Number</button>
  </div>

  <div class="section">
    <div class="section-title">Recent Orders</div>
    <div class="recent-orders" id="recentOrders">
      <div class="empty-orders">
        <div class="empty-icon">📦</div>
        No orders yet
      </div>
    </div>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <div class="action-row">
    <button class="action-btn action-btn-export" id="exportBtn">Export CSV</button>
    <button class="action-btn action-btn-clear" id="clearBtn">Clear Data</button>
  </div>

  <div class="atlas-section">
    <div class="section-title">Connect to Atlas</div>
    <div class="atlas-inputs">
      <input type="text" class="input" id="atlasUrl" placeholder="https://your-app.base44.app">
      <input type="password" class="input" id="atlasToken" placeholder="Bearer Token">
    </div>
    <button class="btn btn-primary" id="connectBtn" style="width: 100%">Connect</button>
  </div>

  <div class="footer">
    <button class="btn btn-secondary" id="openAtlasBtn" style="width: 100%; margin-top: 8px;">Open Atlas Dashboard</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
